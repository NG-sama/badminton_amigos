<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vision Badminton — Leaderboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>🏸 Vision Badminton</h1>
  <a href="matchday.html" class="nav-link">+ Log Matchday</a>
  <span id="last-updated"></span>
</header>

<div class="section">
  <p class="section-title">ELO Rankings</p>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-rank">#</th>
          <th class="col-name">Player</th>
          <th class="col-elo">ELO</th>
          <th class="col-record">W-L</th>
          <th class="col-delta">+/−</th>
        </tr>
      </thead>
      <tbody id="leaderboard-body">
        <tr><td colspan="5" style="color:var(--subtext);padding:1.5rem;text-align:center">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="section">
  <p class="section-title">Biggest Movers</p>
  <div class="movers-grid">
    <div class="mover-card" id="top-gainer"></div>
    <div class="mover-card" id="top-loser"></div>
  </div>
</div>

<script src="js/elo.js"></script>
<script src="js/leaderboard.js"></script>
</body>
</html>
